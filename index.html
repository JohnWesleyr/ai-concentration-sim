<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Power Concentration in the Age of AGI</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #f5efe5;
      --paper: #fbf7f0;
      --ink: #1d1a17;
      --muted: #6d655d;
      --line: #d7caba;
      --blue-deep: #2554a4;
      --blue: #4f7fd8;
      --blue-light: #9cc8ff;
      --blue-soft: rgba(79, 127, 216, 0.18);
      --gold: #b98b1f;
      --gold-soft: rgba(185, 139, 31, 0.18);
      --accent: #8d2a1f;
      --elite: #5e4312;
      --shadow: 0 18px 40px rgba(54, 39, 15, 0.08);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(185, 139, 31, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(79, 127, 216, 0.12), transparent 26%),
        var(--bg);
      color: var(--ink);
    }

    .page {
      width: min(1200px, calc(100vw - 32px));
      margin: 28px auto 56px;
    }

    .hero {
      display: grid;
      gap: 14px;
      margin-bottom: 22px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: fit-content;
      padding: 8px 14px;
      border: 1px solid rgba(29, 26, 23, 0.12);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.66);
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(36px, 5vw, 58px);
      line-height: 0.98;
      font-weight: 600;
      letter-spacing: -0.03em;
      max-width: 12ch;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    @media (max-width: 1040px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .bar-row {
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .bar-value {
        text-align: left;
      }
    }

    .card {
      background: var(--paper);
      border: 1px solid rgba(29, 26, 23, 0.08);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .sidebar {
      padding: 22px;
      display: grid;
      gap: 18px;
      position: sticky;
      top: 20px;
    }

    .section-title {
      margin: 0 0 8px;
      font-size: 17px;
      letter-spacing: 0.02em;
    }

    .section-copy {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }

    .assumptions {
      display: grid;
      gap: 10px;
    }

    .assumption {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 12px;

      background: rgba(255, 255, 255, 0.65);
      border: 1px solid rgba(29, 26, 23, 0.06);

    .assumption h3 {

    .assumption p {

    .icon-shell {

    .controls {

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .range-wrap {
      position: relative;

    .range-help {

    input[type="range"]:disabled {

    .toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.66);
      border: 1px solid rgba(29, 26, 23, 0.08);
    }

    .toggle-copy {
      display: grid;
      gap: 4px;
    }

    .toggle-copy strong {
      font-size: 15px;
    }

    .toggle-copy span {
      font-size: 13px;
      line-height: 1.45;
      color: var(--muted);
    }

    .switch {
      position: relative;
      width: 54px;
      height: 32px;
      flex: 0 0 auto;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .track {
      position: absolute;
      inset: 0;
      background: #c4b29a;
      border-radius: 999px;
      transition: 180ms ease;
      cursor: pointer;
    }

    .track::after {
      content: "";
      position: absolute;
      width: 24px;
      height: 24px;
      left: 4px;
      top: 4px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      transition: 180ms ease;
    }

    .switch input:checked + .track {
      background: var(--accent);
    }

    .switch input:checked + .track::after {
      transform: translateX(22px);
    }

    .chart-card {
      padding: 20px 20px 18px;
      display: grid;
      gap: 16px;
    }

    .chart-head {
      display: flex;
      align-items: start;
      justify-content: space-between;

    }

    .chart-head h2 {
      margin: 0 0 8px;

    .chart-head p {

    .pill-group {

    .pill {

    .legend-dot {

    .svg-wrap {
      position: relative;
      border-radius: 20px;

    svg {

    .totals {

    .total-card {

    .threshold-panel {

      gap: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(29, 26, 23, 0.08);
    }

    .threshold-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
    }

    .threshold-head h3 {
      margin: 0;
      font-size: 16px;
    }

    .threshold-head p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;

    .threshold-status {
      padding: 6px 10px;
      border-radius: 999px;

      letter-spacing: 0.04em;
      text-transform: uppercase;
      border: 1px solid rgba(29, 26, 23, 0.08);
      background: rgba(255,255,255,0.88);
    }

    .threshold-status.crossed {
      background: rgba(141, 42, 31, 0.12);
      color: var(--accent);
      border-color: rgba(141, 42, 31, 0.2);
    }

    .barplot {
      display: grid;
      gap: 14px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 122px minmax(0, 1fr) 64px;
      align-items: center;
      gap: 12px;
    }

    .bar-label {
      font-size: 14px;
    }

    .bar-track {
      position: relative;
      height: 18px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(29, 26, 23, 0.08);
      border: 1px solid rgba(29, 26, 23, 0.06);
    }

    .bar-track-wrap {
      position: relative;
      padding-top: 18px;
    }

    .track-threshold {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 0;
      border-left: 2px dashed rgba(141, 42, 31, 0.65);
      pointer-events: none;
      z-index: 2;
    }

    .track-threshold span {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 12px;
      color: var(--accent);
      background: var(--paper);
      padding: 0 6px;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
    }

    .bar-value {
      text-align: right;
      font-size: 13px;
      color: var(--muted);
    }

    .big-number {
      font-size: clamp(24px, 3vw, 34px);
      line-height: 0.95;
      font-weight: 600;
    }

    .meta {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
    }

    .totals-note {
      margin-top: -2px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .lucide {
      width: 20px;
      height: 20px;
      stroke-width: 1.8;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
<body>
  <main id="root"></main>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const PERCENTILES = Array.from({ length: 101 }, (_, i) => i);
    const ELITE_CUTOFF = 95;
    const EARLY_ABSOLUTE_Y_MAX = 1.15;
    const ADAPTIVE_LABOR_RATIO_THRESHOLD = 0.08;
    const PEAK_PRESSURE_START = 0.82;
    const AGI_GROWTH_RATE = 0.22;
    const TAKEOFF_TIME_SCALE = 10;
    const UBI_GROWTH_BREAK_EVEN_RATE = 100;
    const POWER_BREAK_EVEN_HORIZON = 60;

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function smoothstep(value) {
      const x = clamp(value, 0, 1);
      return x * x * (3 - 2 * x);
    }

    function formatPct(value) {
      return `${value.toFixed(1)}%`;
    }

    function formatControlPct(value) {
      return `${value.toFixed(1)}%`;
    }

    function formatAxisValue(value) {
      if (value >= 100) return `${Math.round(value)}`;
      if (value >= 10) return value.toFixed(1);
      return value.toFixed(2);
    }

    function formatSupportValue(value) {
      const abs = Math.abs(value);
      if (abs >= 1e12) return `${(value / 1e12).toFixed(1)}T`;
      if (abs >= 1e9) return `${(value / 1e9).toFixed(1)}B`;
      if (abs >= 1e6) return `${(value / 1e6).toFixed(1)}M`;
      if (abs >= 1e3) return `${(value / 1e3).toFixed(1)}K`;
      if (abs >= 100) return `${value.toFixed(0)}`;
      if (abs >= 10) return `${value.toFixed(1)}`;
      return `${value.toFixed(2)}`;
    }

    function IconShell({ children }) {
      return <div className="icon-shell">{children}</div>;
    }

    function CrownIcon() {
      return (
        <svg className="lucide" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 18h18" />
          <path d="M5 18 3.5 8.5l5.5 4 3-6 3 6 5.5-4L19 18" />
        </svg>
      );
    }

    function TrendIcon() {
      return (
        <svg className="lucide" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 17l6-6 4 4 7-8" />
          <path d="M14 7h6v6" />
        </svg>
      );
    }

    function FactoryIcon() {
      return (
        <svg className="lucide" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 21h18" />
          <path d="M5 21V9l5 3V9l5 3V5l4 2v14" />
        </svg>
      );
    }

    function ShieldIcon() {
      return (
        <svg className="lucide" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z" />
          <path d="M9.5 12.5 11 14l4-4" />
        </svg>
      );
    }

    function CpuIcon() {
      return (
        <svg className="lucide" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="7" y="7" width="10" height="10" rx="2" />
          <path d="M12 1v3M12 20v3M4 12H1M23 12h-3M5 5 3 3M21 21l-2-2M19 5l2-2M5 19l-2 2" />
        </svg>
      );
    }

    function UsersIcon() {
      return (
        <svg className="lucide" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
      );
    }

    function buildPowerState(step, ubiRatePercent, publicOwnershipPercent) {
      const ubiRate = clamp(ubiRatePercent / 100, 0, 1);
      const publicOwnership = clamp(publicOwnershipPercent / 100, 0, 1);
      const laborRetention = Math.exp(-step / 58);
      const socialContractStrength = Math.exp(-step / 90);
      const grossTakeoffAmplitude = Math.max(0, Math.pow(1 + AGI_GROWTH_RATE, step / TAKEOFF_TIME_SCALE) - 1);
      const priorGrossTakeoffAmplitude = Math.max(0, Math.pow(1 + AGI_GROWTH_RATE, Math.max(step - 1, 0) / TAKEOFF_TIME_SCALE) - 1);
      const concentrationExponent = 18 + 56 * (1 - Math.exp(-step / 110));
      const concentrationCenter = 0.986 + 0.011 * (1 - Math.exp(-step / 170));
      const concentrationSteepness = 90 + 260 * (1 - Math.exp(-step / 140));
      const privateTakeoffAmplitude = (1 - publicOwnership) * Math.max(
        0,
        Math.pow(1 + AGI_GROWTH_RATE * (1 - ubiRate), step / TAKEOFF_TIME_SCALE) - 1
      );
      const publicOwnedTakeoffAmplitude = publicOwnership * grossTakeoffAmplitude;
      const privateGrossGainAmplitude = (1 - publicOwnership) * Math.max(0, grossTakeoffAmplitude - priorGrossTakeoffAmplitude);

      const rawRows = PERCENTILES.map((percentile) => {
        const x = percentile / 100;
        const physical = 0.026;
        const laborBase =
          0.048 +
          0.07 * Math.pow(x, 0.76) +
          0.028 / (1 + Math.exp(-10 * (x - 0.72)));
        const labor = laborBase * laborRetention;
        const baseCapital =
          0.0018 +
          0.0035 * Math.pow(x, 2.5) +
          0.011 * Math.pow(x, 10) +
          0.08 / (1 + Math.exp(-60 * (x - 0.992)));
        const takeoffShape =
          0.00015 * Math.pow(x, 8) +
          0.006 * Math.pow(x, concentrationExponent) +
          0.38 / (1 + Math.exp(-concentrationSteepness * (x - concentrationCenter)));

        return {
          percentile,
          physical,
          labor,
          baseCapital,
          takeoffShape,
        };
      });

      const takeoffShapeTotal = rawRows.reduce((sum, row) => sum + row.takeoffShape, 0);
      const publicOwnershipStockTotal = publicOwnedTakeoffAmplitude * takeoffShapeTotal;
      const ubiFlowTotal = ubiRate * privateGrossGainAmplitude * takeoffShapeTotal;
      const socialContractFlowTotal = socialContractStrength * privateGrossGainAmplitude * takeoffShapeTotal * 0.18;
      const publicCapitalPerPerson = publicOwnershipStockTotal / PERCENTILES.length;

      const rows = rawRows.map((row) => {
        const privateCapital = row.baseCapital + row.takeoffShape * privateTakeoffAmplitude;
        const publicCapital = publicCapitalPerPerson;
        const total = row.physical + row.labor + publicCapital + privateCapital;

        return {
          percentile: row.percentile,
          physical: row.physical,
          labor: row.labor,
          publicCapital,
          capital: privateCapital,
          total,
        };
      });

      const sum = (items, accessor) => items.reduce((acc, item) => acc + accessor(item), 0);
      const elite = rows.filter((row) => row.percentile >= ELITE_CUTOFF);
      const common = rows.filter((row) => row.percentile < ELITE_CUTOFF);
      const fullTotal = sum(rows, (row) => row.total);

      return {
        rows,
        totals: {
          commonShare: fullTotal ? (sum(common, (row) => row.total) / fullTotal) * 100 : 0,
          eliteShare: fullTotal ? (sum(elite, (row) => row.total) / fullTotal) * 100 : 0,
          physicalShare: fullTotal ? (sum(rows, (row) => row.physical) / fullTotal) * 100 : 0,
          laborShare: fullTotal ? (sum(rows, (row) => row.labor) / fullTotal) * 100 : 0,
          publicCapitalShare: fullTotal ? (sum(rows, (row) => row.publicCapital) / fullTotal) * 100 : 0,
          capitalShare: fullTotal ? (sum(rows, (row) => row.capital) / fullTotal) * 100 : 0,
          ubiSupportTotal: ubiFlowTotal,
          socialContractSupportTotal: socialContractFlowTotal,
          laborRatio: laborRetention,
          fullTotal,
        },
      };
    }

    function areaPath(data, xScale, yScale, topAccessor, bottomAccessor) {
      if (!data.length) return "";
      const top = data
        .map((d, index) => `${index === 0 ? "M" : "L"} ${xScale(d.percentile)} ${yScale(topAccessor(d))}`)
        .join(" ");
      const bottom = [...data]
        .reverse()
        .map((d) => `L ${xScale(d.percentile)} ${yScale(bottomAccessor(d))}`)
        .join(" ");
      return `${top} ${bottom} Z`;
    }

    function linePath(data, xScale, yScale, accessor) {
      return data
        .map((d, index) => `${index === 0 ? "M" : "L"} ${xScale(d.percentile)} ${yScale(accessor(d))}`)
        .join(" ");
    }

    function findTaxRateForTargetEliteShare(step, publicOwnershipPercent, targetEliteShare) {
      const futureStep = step + POWER_BREAK_EVEN_HORIZON;
      const shareAt = (rate) =>
        buildPowerState(futureStep, rate, publicOwnershipPercent).totals.eliteShare;

      const lowShare = shareAt(0);
      if (lowShare <= targetEliteShare) return 0;

      const highShare = shareAt(100);
      if (highShare > targetEliteShare) return 100;

      let low = 0;
      let high = 100;
      for (let i = 0; i < 24; i += 1) {
        const mid = (low + high) / 2;
        if (shareAt(mid) > targetEliteShare) {
          low = mid;
        } else {
          high = mid;
        }
      }
      return high;
    }

    function findOwnershipPowerDriftBreakEvenRate(step, ubiRatePercent) {
      const baseShare = buildPowerState(step, ubiRatePercent, 0).totals.eliteShare;
      return findTaxRateForTargetEliteShare(step, 0, baseShare);
    }

    function computeTaxFirstAutoPolicy(step) {
      const uncontrolledShare = buildPowerState(step, 0, 0).totals.eliteShare;
      const publicControlStart = 45;
      const noReturn = 50;
      const approachTarget = 46;
      const transitionTarget = 49.5;
      const maxTaxCeiling = 35;
      const stableOwnershipTarget = 70;

      if (uncontrolledShare < publicControlStart) {
        const targetEliteShare = Math.min(approachTarget, uncontrolledShare + 0.8);
        const requiredTax = findTaxRateForTargetEliteShare(step, 0, targetEliteShare);
        return {
          phase: "tax-first",
          effectiveUbiRate: Math.min(maxTaxCeiling, requiredTax),
          effectivePublicOwnership: 0,
          uncontrolledEliteShare: uncontrolledShare,
          targetEliteShare,
          ownershipTarget: 0,
        };
      }

      const transitionProgress = smoothstep((uncontrolledShare - publicControlStart) / (noReturn - publicControlStart));
      const targetEliteShare = publicControlStart + transitionProgress * (transitionTarget - publicControlStart);
      const ownershipTarget = transitionProgress * stableOwnershipTarget;
      const requiredOwnership = Math.max(ownershipTarget, 0);
      const requiredTax = findTaxRateForTargetEliteShare(step, requiredOwnership, targetEliteShare);
      const fadeTax = 1 - transitionProgress;

      return {
        phase: transitionProgress >= 0.98 ? "ownership" : "handoff",
        effectiveUbiRate: Math.min(maxTaxCeiling, requiredTax) * fadeTax,
        effectivePublicOwnership: requiredOwnership,
        uncontrolledEliteShare: uncontrolledShare,
        targetEliteShare,
        ownershipTarget,
      };
    }

    function App() {
      const [time, setTime] = useState(0);
      const [speed, setSpeed] = useState(8);
      const [ubiRate, setUbiRate] = useState(0);
      const [publicOwnership, setPublicOwnership] = useState(0);
      const [playing, setPlaying] = useState(true);
      const [autoPolicy, setAutoPolicy] = useState(false);

      useEffect(() => {
        if (!playing) return undefined;

        const interval = setInterval(() => {
          setTime((current) => current + Math.max(1, Math.round(speed)));
        }, 160);

        return () => clearInterval(interval);
      }, [playing, speed]);

      const autoPolicyPlan = useMemo(() => computeTaxFirstAutoPolicy(time), [time]);

      const effectiveUbiRate = autoPolicy ? autoPolicyPlan.effectiveUbiRate : ubiRate;
      const effectivePublicOwnership = autoPolicy ? autoPolicyPlan.effectivePublicOwnership : publicOwnership;

      const state = useMemo(
        () => buildPowerState(time, effectiveUbiRate, effectivePublicOwnership),
        [time, effectiveUbiRate, effectivePublicOwnership]
      );

      const { rows: data, totals } = state;

      const chart = useMemo(() => {
        const width = 760;
        const height = 460;
        const margin = { top: 28, right: 24, bottom: 54, left: 72 };
        const innerWidth = width - margin.left - margin.right;
        const innerHeight = height - margin.top - margin.bottom;
        const peakTotal = Math.max(...data.map((row) => row.total));
        const peakPressure = peakTotal / EARLY_ABSOLUTE_Y_MAX;
        const peakPressureProgress = smoothstep((peakPressure - PEAK_PRESSURE_START) / (1 - PEAK_PRESSURE_START));
        const lateLaborProgress = smoothstep((ADAPTIVE_LABOR_RATIO_THRESHOLD - totals.laborRatio) / ADAPTIVE_LABOR_RATIO_THRESHOLD);
        const adaptiveProgress = Math.max(peakPressureProgress, lateLaborProgress);
        const adaptiveTarget = Math.max(EARLY_ABSOLUTE_Y_MAX, peakTotal * 1.06);
        const maxTotal = EARLY_ABSOLUTE_Y_MAX + (adaptiveTarget - EARLY_ABSOLUTE_Y_MAX) * adaptiveProgress;

        const xScale = (percentile) => margin.left + (percentile / 100) * innerWidth;
        const yScale = (value) => margin.top + innerHeight - (value / maxTotal) * innerHeight;

        return {
          width,
          height,
          margin,
          innerWidth,
          innerHeight,
          maxTotal,
          peakTotal,
          adaptiveProgress,
          xScale,
          yScale,
          physicalArea: areaPath(data, xScale, yScale, (d) => d.physical, () => 0),
          laborArea: areaPath(
            data,
            xScale,
            yScale,
            (d) => d.physical + d.labor,
            (d) => d.physical
          ),
          publicArea: areaPath(
            data,
            xScale,
            yScale,
            (d) => d.physical + d.labor + d.publicCapital,
            (d) => d.physical + d.labor
          ),
          capitalArea: areaPath(
            data,
            xScale,
            yScale,
            (d) => d.total,
            (d) => d.physical + d.labor + d.publicCapital
          ),
          totalLine: linePath(data, xScale, yScale, (d) => d.total),
          publicLine: linePath(data, xScale, yScale, (d) => d.physical + d.labor + d.publicCapital),
          laborLine: linePath(data, xScale, yScale, (d) => d.physical + d.labor),
          physicalLine: linePath(data, xScale, yScale, (d) => d.physical),
        };
      }, [data, totals.laborRatio]);

      const noReturnCrossed = totals.eliteShare >= 50;
      const yTicks = [0, 0.25, 0.5, 0.75, 1].map((ratio) => ratio * chart.maxTotal);

      return (
        <main className="page">
          <header className="hero">
            <div className="eyebrow">
              <CpuIcon />
              Mental model of political economy under AGI
            </div>
            <h1>Power Concentration in the Age of AGI</h1>
          </header>

          <section className="layout">
            <aside className="sidebar card">
              <div>
                <h2 className="section-title">The Four Assumptions</h2>
              </div>

              <div className="assumptions">
                <div className="assumption">
                  <IconShell><CrownIcon /></IconShell>
                  <div>
                    <h3>Egotism</h3>
                    <p>Actors try to maximize their own power rather than naturally equalize society.</p>
                  </div>
                </div>
                <div className="assumption">
                  <IconShell><TrendIcon /></IconShell>
                  <div>
                    <h3>Recursion</h3>
                    <p>Power compounds. Existing power makes the next increment easier to capture.</p>
                  </div>
                </div>
                <div className="assumption">
                  <IconShell><FactoryIcon /></IconShell>
                  <div>
                    <h3>Social Contract</h3>
                    <p>While elites still depend on broad wellbeing, part of recursive capital is recycled back into society instead of staying fully concentrated.</p>
                  </div>
                </div>
                <div className="assumption">
                  <IconShell><ShieldIcon /></IconShell>
                  <div>
                    <h3>Constant Physical Power</h3>
                    <p>Humans retain a shared floor of strike power, voting power, and physical disruption capacity, even if that floor becomes dwarfed by recursive capital.</p>
                  </div>
                </div>
              </div>

              <div className="controls">
                <div className="toggle">
                  <div className="toggle-copy">
                    <strong>Tax-First Auto Switch</strong>
                    <span>
                      Uses a simple safeguard heuristic: slow concentration with tax first, then ramp public ownership once the uncontrolled path gets close to the 50% line.
                    </span>
                    {autoPolicy ? (
                      <span>
                        Phase: {autoPolicyPlan.phase}. Uncontrolled elite share: {formatPct(autoPolicyPlan.uncontrolledEliteShare)}. Target share: {formatPct(autoPolicyPlan.targetEliteShare)}.
                      </span>
                    ) : null}
                  </div>
                  <label className="switch">
                    <input
                      type="checkbox"
                      checked={autoPolicy}
                      onChange={(event) => setAutoPolicy(event.target.checked)}
                    />
                    <span className="track"></span>
                  </label>
                </div>

                <div className="slider-shell">
                  <div className="control-row">
                    <strong>Simulation</strong>
                    <span>T{time}</span>
                  </div>
                  <div className="button-row">
                    <button
                      type="button"
                      className={`control-button ${playing ? "primary" : ""}`}
                      onClick={() => setPlaying((value) => !value)}
                    >
                      {playing ? "Pause" : "Play"}
                    </button>
                    <button
                      type="button"
                      className="control-button"
                      onClick={() => {
                        setPlaying(false);
                        setTime(0);
                      }}
                    >
                      Reset
                    </button>
                  </div>
                  <div className="control-row" style={{ marginTop: 10, marginBottom: 0 }}>
                    <span>Speed</span>
                    <span>{speed.toFixed(1)}x</span>
                  </div>
                  <input
                    type="range"
                    min="0.5"
                    max="8"
                    step="0.5"
                    value={speed}
                    onChange={(event) => setSpeed(Number(event.target.value))}
                  />
                </div>

                <div className="slider-shell">
                  <div className="control-row">
                    <strong>UBI Tax Rate</strong>
                    <span>{effectivePublicOwnership >= 100 ? "Inactive" : formatControlPct(effectiveUbiRate)}</span>
                  </div>
                  <div className="range-wrap">
                    <input
                      type="range"
                      min="0"
                      max="100"
                      step="0.1"
                      value={effectiveUbiRate}
                      disabled={effectivePublicOwnership >= 100 || autoPolicy}
                      onChange={(event) => setUbiRate(Number(event.target.value))}
                    />
                  </div>
                  <div className="range-help">
                    {effectivePublicOwnership >= 100
                      ? "Full public ownership leaves no private AGI gains to tax."
                      : autoPolicy
                      ? `Auto switch is active. It uses tax to aim for a projected elite share of ${formatPct(autoPolicyPlan.targetEliteShare)} over the next ${POWER_BREAK_EVEN_HORIZON} ticks, then hands off to ownership near the threshold.`
                      : "This slider taxes private AGI gains. It can slow concentration and sustain support, but it is not treated as a durable power fix by itself."}
                  </div>
                </div>

                <div className="slider-shell">
                  <div className="control-row">
                    <strong>Public Ownership Share</strong>
                    <span>{formatControlPct(effectivePublicOwnership)}</span>
                  </div>
                  <div className="range-wrap">
                    <input
                      type="range"
                      min="0"
                      max="100"
                      step="0.1"
                      value={effectivePublicOwnership}
                      disabled={autoPolicy}
                      onChange={(event) => setPublicOwnership(Number(event.target.value))}
                    />
                  </div>
                  <div className="range-help">
                    {autoPolicy
                      ? `Auto switch is active. Ownership target for this phase: ${formatControlPct(autoPolicyPlan.ownershipTarget)}.`
                      : "This is stock ownership of the AGI core. Higher values move more recursive AGI capital into the public layer and away from private concentration."}
                  </div>
                </div>
              </div>
            </aside>

            <section className="chart-card card">
              <div className="chart-head">
                <div>
                  <h2>Absolute Power Distribution</h2>
                </div>
                <div className="pill-group">
                  <div className="pill"><span className="legend-dot" style={{ background: "var(--blue-deep)" }}></span>Physical power</div>
                  <div className="pill"><span className="legend-dot" style={{ background: "var(--blue-light)" }}></span>Lifetime labor capital</div>
                  <div className="pill"><span className="legend-dot" style={{ background: "#3f9a57" }}></span>Public AGI capital</div>
                  <div className="pill"><span className="legend-dot" style={{ background: "var(--gold)" }}></span>Private recursive capital</div>
                  <div className="pill"><UsersIcon /> Common people left</div>
                  <div className="pill"><CpuIcon /> AGI owners right tail</div>
                </div>
              </div>

              <div className="svg-wrap">
                <svg viewBox={`0 0 ${chart.width} ${chart.height}`} role="img" aria-label="Stacked area chart of power concentration">
                  <defs>
                    <linearGradient id="physicalFill" x1="0" x2="0" y1="0" y2="1">
                      <stop offset="0%" stopColor="#2f66c4" stopOpacity="0.95" />
                      <stop offset="100%" stopColor="#2554a4" stopOpacity="0.72" />
                    </linearGradient>
                    <linearGradient id="laborFill" x1="0" x2="0" y1="0" y2="1">
                      <stop offset="0%" stopColor="#b5d6ff" stopOpacity="0.95" />
                      <stop offset="100%" stopColor="#86b7f6" stopOpacity="0.78" />
                    </linearGradient>
                    <linearGradient id="publicFill" x1="0" x2="0" y1="0" y2="1">
                      <stop offset="0%" stopColor="#7ecf93" stopOpacity="0.92" />
                      <stop offset="100%" stopColor="#3f9a57" stopOpacity="0.78" />
                    </linearGradient>
                    <linearGradient id="goldFill" x1="0" x2="1" y1="0" y2="0">
                      <stop offset="0%" stopColor="#d8b25d" stopOpacity="0.55" />
                      <stop offset="55%" stopColor="#c39428" stopOpacity="0.75" />
                      <stop offset="100%" stopColor="#8d6511" stopOpacity="0.97" />
                    </linearGradient>
                  </defs>

                  <rect
                    x={chart.xScale(ELITE_CUTOFF)}
                    y={chart.margin.top}
                    width={chart.xScale(100) - chart.xScale(ELITE_CUTOFF)}
                    height={chart.innerHeight}
                    fill="rgba(185, 139, 31, 0.08)"
                    stroke="rgba(94, 67, 18, 0.14)"
                    strokeDasharray="6 8"
                  />

                  {yTicks.map((tick, index) => (
                    <g key={index}>
                      <line
                        x1={chart.margin.left}
                        x2={chart.margin.left + chart.innerWidth}
                        y1={chart.yScale(tick)}
                        y2={chart.yScale(tick)}
                        stroke="rgba(29,26,23,0.08)"
                      />
                      <text
                        x={chart.margin.left - 14}
                        y={chart.yScale(tick) + 4}
                        textAnchor="end"
                        fontSize="12"
                        fill="var(--muted)"
                      >
                        {formatAxisValue(tick)}
                      </text>
                    </g>
                  ))}

                  {[0, 25, 50, 75, 100].map((tick) => (
                    <g key={tick}>
                      <line
                        x1={chart.xScale(tick)}
                        x2={chart.xScale(tick)}
                        y1={chart.margin.top}
                        y2={chart.margin.top + chart.innerHeight}
                        stroke="rgba(29,26,23,0.05)"
                      />
                      <text
                        x={chart.xScale(tick)}
                        y={chart.margin.top + chart.innerHeight + 28}
                        textAnchor="middle"
                        fontSize="12"
                        fill="var(--muted)"
                      >
                        {tick}
                      </text>
                    </g>
                  ))}

                  <path d={chart.physicalArea} fill="url(#physicalFill)" />
                  <path d={chart.laborArea} fill="url(#laborFill)" />
                  <path d={chart.publicArea} fill="url(#publicFill)" />
                  <path d={chart.capitalArea} fill="url(#goldFill)" />
                  <path d={chart.physicalLine} fill="none" stroke="rgba(23,67,140,0.92)" strokeWidth="2.1" />
                  <path d={chart.laborLine} fill="none" stroke="rgba(96,146,222,0.82)" strokeWidth="2.2" />
                  <path d={chart.publicLine} fill="none" stroke="rgba(63,154,87,0.84)" strokeWidth="2.2" />
                  <path d={chart.totalLine} fill="none" stroke="rgba(96,67,18,0.95)" strokeWidth="3" />

                  <line
                    x1={chart.margin.left}
                    x2={chart.margin.left}
                    y1={chart.margin.top}
                    y2={chart.margin.top + chart.innerHeight}
                    stroke="rgba(29,26,23,0.24)"
                    strokeWidth="1.4"
                  />
                  <line
                    x1={chart.margin.left}
                    x2={chart.margin.left + chart.innerWidth}
                    y1={chart.margin.top + chart.innerHeight}
                    y2={chart.margin.top + chart.innerHeight}
                    stroke="rgba(29,26,23,0.24)"
                    strokeWidth="1.4"
                  />

                  <text
                    x={chart.margin.left + 8}
                    y={chart.margin.top + 18}
                    fontSize="12"
                    fill="var(--muted)"
                    textAnchor="start"
                  >
                    Absolute power
                  </text>
                  <text
                    x={chart.xScale(ELITE_CUTOFF) + 12}
                    y={chart.margin.top + 24}
                    fontSize="12"
                    fill="var(--elite)"
                    textAnchor="start"
                  >
                    AI-owning elite cluster
                  </text>
                </svg>

                <div className="axis-note">
                  <span>Y-axis: Absolute Power</span>
                  <span>X-axis: Population Percentiles</span>
                </div>
              </div>

              <div className="totals">
                <div className="total-card">
                  <h3>Physical Power</h3>
                  <div className="big-number" style={{ color: "var(--blue-deep)" }}>{formatPct(totals.physicalShare)}</div>
                  <div className="meta">
                    Share of total power still sitting in bodily resistance and counting-heads power.
                  </div>
                </div>

                <div className="total-card">
                  <h3>Labor Capital</h3>
                  <div className="big-number" style={{ color: "var(--blue-light)" }}>{formatPct(totals.laborShare)}</div>
                  <div className="meta">
                    Share of total power still tied to lifetime human economic utility.
                  </div>
                </div>

                <div className="total-card">
                  <h3>Public Capital</h3>
                  <div className="big-number" style={{ color: "#3f9a57" }}>{formatPct(totals.publicCapitalShare)}</div>
                  <div className="meta">
                    Share of total power sitting in collectively owned AGI capital.
                  </div>
                </div>

                <div className="total-card">
                  <h3>Private Capital</h3>
                  <div className="big-number" style={{ color: "var(--gold)" }}>{formatPct(totals.capitalShare)}</div>
                  <div className="meta">
                    Share of total power still sitting in privately held recursive capital.
                  </div>
                </div>

                <div className="total-card">
                  <h3>UBI Support</h3>
                  <div className="big-number" style={{ color: "var(--accent)" }}>{formatSupportValue(totals.ubiSupportTotal)}</div>
                  <div className="meta">
                    Support flow distributed this tick. It is not counted as durable power in the chart or threshold bar.
                  </div>
                </div>

                <div className="total-card">
                  <h3>Social Contract Support</h3>
                  <div className="big-number" style={{ color: "var(--muted)" }}>{formatSupportValue(totals.socialContractSupportTotal)}</div>
                  <div className="meta">
                    Built-in support flow from residual elite dependence. It is tracked separately from power.
                  </div>
                </div>
              </div>

              <div className="totals-note">
                The power chart counts only durable power: physical resistance, lifetime labor capital, public AGI capital, and private AGI capital. UBI and the social contract are shown separately as support flows.
              </div>

              <div className="threshold-panel">
                <div className="threshold-head">
                  <div>
                    <h3>Power Share Threshold</h3>
                    <p>50% is the effective-power line where one side can outweigh the other.</p>
                  </div>
                  <div className={`threshold-status ${noReturnCrossed ? "crossed" : ""}`}>
                    {noReturnCrossed ? "Elite above 50%" : "Elite below 50%"}
                  </div>
                </div>

                <div className="barplot" aria-label="Power share split bar with a 50 percent threshold marker">
                  <div className="bar-track-wrap">
                    <div className="track-threshold">
                      <span>50% point of no return</span>
                    </div>
                    <div className="bar-track" style={{ display: "flex", height: 24 }}>
                      <div
                        className="bar-fill"
                        style={{ width: `${totals.commonShare}%`, background: "var(--blue)" }}
                      ></div>
                      <div
                        className="bar-fill"
                        style={{ width: `${totals.eliteShare}%`, background: "var(--gold)" }}
                      ></div>
                    </div>
                  </div>
                  <div className="threshold-head">
                    <p>Common people: {formatPct(totals.commonShare)}</p>
                    <p>Private AI owners: {formatPct(totals.eliteShare)}</p>
                  </div>
                </div>
              </div>
            </section>
          </section>
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
